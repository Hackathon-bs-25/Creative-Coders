<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Социални мрежи | Creative Coders</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #3498db;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        nav a:hover {
            background-color: #3498db;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .social-container {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .social-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .social-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .social-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .instagram { color: #E1306C; }
        .discord { color: #5865F2; }
        .website { color: #3498db; }
        .social-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .social-link a {
            color: #2c3e50;
            text-decoration: none;
            word-break: break-all;
        }
        .social-link a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>Creative Coders</h1>
        <p>Състезание по програмиране за ученици</p>
    </header>
    
    <nav>
        <a href="programa.html">Програма</a>
        <a href="vazhni-linkove.html">Важни линкове</a>
        <a href="socialni-mrezi.html">Социални мрежи</a>
        <a href="registraciq.html">Регистрация</a>
        <a href="proverka.html">Проверка</a>
        <a href="kontakti.html">Контакти</a>
    </nav>
    
    <div class="container">
        <h2>Социални мрежи</h2>
        
        <div class="social-container">
            <div class="social-grid">
                <div class="social-card">
                    <div class="social-icon instagram"><i class="fab fa-instagram"></i></div>
                    <div class="social-title">Instagram</div>
                    <div class="social-link"><a href="https://www.instagram.com/creative._.coders/" target="_blank">@creative._.coders</a></div>
                </div>
                
                <div class="social-card">
                    <div class="social-icon discord"><i class="fab fa-discord"></i></div>
                    <div class="social-title">Discord</div>
                    <div class="social-link"><a href="https://discord.gg/3Mnvt9KbVc" target="_blank">Discord сървър</a></div>
                </div>
                
                <div class="social-card">
                    <div class="social-icon website"><i class="fas fa-globe"></i></div>
                    <div class="social-title">Официален уебсайт</div>
                    <div class="social-link"><a href="https://todorov-tees.my.canva.site/creative-coders" target="_blank">Creative Coders</a></div>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2025 Creative Coders. Всички права запазени.</p>
    </footer>

    <script>
        if (localStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
