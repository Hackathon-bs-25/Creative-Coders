<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти | Creative Coders</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #3498db;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        nav a:hover {
            background-color: #3498db;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .contact-container {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }
        .contact-info {
            margin-bottom: 30px;
        }
        .contact-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .contact-icon {
            margin-right: 15px;
            color: #3498db;
            font-size: 20px;
            width: 30px;
            text-align: center;
        }
        .email-form {
            margin-top: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        .submit-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>Creative Coders</h1>
        <p>Състезание по програмиране за ученици</p>
    </header>
    
    <nav>
        <a href="programa.html">Програма</a>
        <a href="vazhni-linkove.html">Важни линкове</a>
        <a href="socialni-mrezi.html">Социални мрежи</a>
        <a href="kontakti.html">Контакти</a>
    </nav>
    
    <div class="container">
        <h2>Контакти</h2>
        
        <div class="contact-container">
            <div class="contact-info">
                <h3>Свържете се с нас</h3>
                
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div>Email: <a href="mailto:Teodor.coders@outlook.com">Teodor.coders@outlook.com</a></div>
                </div>
            </div>
            
            <div class="email-form">
                <h3>Изпратете ни съобщение</h3>
                
                <form id="contactForm" action="mailto:Teodor.coders@outlook.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label for="name">Вашето име:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Вашият email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Тема:</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Съобщение:</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Изпрати съобщение</button>
                </form>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2025 Creative Coders. Всички права запазени.</p>
    </footer>

    <script>
        if (localStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'index.html';
        }
        
        // Добавяне на директен линк за email клиент
        const emailLink = document.createElement('a');
        emailLink.href = 'mailto:Teodor.coders@outlook.com';
        emailLink.style.display = 'none';
        document.body.appendChild(emailLink);
        
        // Бутон за директен email
        const directEmailBtn = document.createElement('button');
        directEmailBtn.textContent = 'Пишете ни директно';
        directEmailBtn.className = 'submit-btn';
        directEmailBtn.style.marginTop = '20px';
        directEmailBtn.onclick = function() {
            emailLink.click();
        };
        
        document.querySelector('.contact-info').appendChild(directEmailBtn);
    </script>
</body>
</html>
