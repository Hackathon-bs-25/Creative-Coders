<head>
    <meta charset="UTF-8">

    <title>Вход | Creative Coders</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }
        .logo {
            width: 150px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .error {
            color: #e74c3c;
            margin-top: 15px;
        }
    </style>

        <h1>Вход в системата</h1>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Потребителско име</label>
                <input type="text" id="username" placeholder="Въведете потребителско име" required>
            </div>
            <div class="input-group">
                <label for="password">Парола</label>
                <input type="password" id="password" placeholder="Въведете парола" required>
            </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'user01' && password === 'staff25!') {
                localStorage.setItem('authenticated', 'true');
                window.location.href = 'programa.html';
            } else {
                document.getElementById('error').textContent = 'Грешно потребителско име или парола!';
            }
        });
    </script>
